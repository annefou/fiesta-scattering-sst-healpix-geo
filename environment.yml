name: fiesta-sst-healpix
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.11
  - numpy=2.2
  - healpy=1.19
  - xarray=2025.4
  - scikit-learn=1.6
  - matplotlib=3.10
  - jupytext
  - jupyter
  - nbclient
  - ipykernel
  - snakemake
  - pip
  - pip:
      - copernicusmarine==2.4.0
      - healpix-resample==0.1.5
      - healpix-geo==0.0.11
      # CPU-patched fork of FOSCAT (upstream PR: jmdelouis/FOSCAT#40)
      # Use 'foscat' from PyPI instead if running on a CUDA GPU machine
      - foscat @ git+https://github.com/annefou/FOSCAT.git@v0.1.0-cpu

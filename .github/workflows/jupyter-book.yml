name: Build and Deploy Jupyter Book

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI_MODE: "1"
      COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          environment-file: environment.yml
          environment-name: fiesta-sst-healpix
          init-shell: bash
          cache-environment: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install MyST
        run: npm install -g mystmd

      - name: Setup Copernicus Marine credentials
        run: |
          mkdir -p ~/.copernicusmarine
          echo "[credentials]
          username=${COPERNICUSMARINE_SERVICE_USERNAME}
          password=${COPERNICUSMARINE_SERVICE_PASSWORD}" | base64 > ~/.copernicusmarine/.copernicusmarine-credentials

      - name: Execute notebook
        shell: micromamba-shell {0}
        run: |
          jupytext --to notebook 01_sphere_vs_wgs84.py
          jupyter execute 01_sphere_vs_wgs84.ipynb

      - name: Build MyST site
        shell: micromamba-shell {0}
        env:
          BASE_URL: /${{ github.event.repository.name }}
        run: myst build --html

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
